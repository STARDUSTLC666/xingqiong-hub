(function(){
  const c=document.getElementById('sakura'),ctx=c.getContext('2d');
  c.width=window.innerWidth; c.height=window.innerHeight;
  window.addEventListener('resize',()=>{c.width=window.innerWidth;c.height=window.innerHeight;});
  const petals=[];
  for(let i=0;i<40;i++) petals.push({
    x:Math.random()*c.width, y:Math.random()*c.height,
    r:Math.random()*3+1, s:Math.random()*0.5+0.3,
    w:Math.random()*0.3+0.1, a:Math.random()*Math.PI*2
  });
  function draw(){
    ctx.clearRect(0,0,c.width,c.height);
    for(const p of petals){
      p.y+=p.s; p.x+=Math.sin(p.a)*0.3; p.a+=0.01;
      if(p.y>c.height+10){p.y=-10;p.x=Math.random()*c.width;}
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,160,180,${0.15+p.w})`;
      ctx.fill();
    }
    requestAnimationFrame(draw);
  }
  draw();
})();

let weights = {}; // {tag: weight}

function getWeight(tag){ return weights[tag]||1.0; }
function setWeight(tag, w){
  if(w<=0){ delete weights[tag]; renderWeights(); return; }
  weights[tag] = Math.round(w*100)/100;
  renderWeights();
}

function addTag(tag, w=1.0){
  if(weights[tag]!==undefined) return;

function removeTag(tag){ delete weights[tag]; renderWeights(); }

function importTags(){
  const raw=document.getElementById('importInput').value;
  if(!raw.trim()){gsToast('请先粘贴标签');return;}
  // Split by comma, semicolon, or newlines
  const tags=raw.split(/[,;，；\n]+/).map(t=>{
    // Check for (tag:weight) format
    const m=t.trim().match(/^\((.+?):([\d.]+)\)$/);
    if(m) return {tag:m[1].trim(), w:parseFloat(m[2])};
    // Check for (tag) format
    const m2=t.trim().match(/^\((.+?)\)$/);
    if(m2) return {tag:m2[1].trim(), w:1.1};
    return {tag:t.trim(), w:1.0};
  }).filter(t=>t.tag);
  let added=0;
  tags.forEach(t=>{if(!weights[t.tag]){weights[t.tag]=t.w;added++;}});
  document.getElementById('importCount').textContent='导入了 '+added+' 个新词条';
  renderWeights();
  if(added) gsToast('导入 '+added+' 个词条');
}

async function importFromClipboard(){
  try{
    const text=await navigator.clipboard.readText();
    document.getElementById('importInput').value=text;
    importTags();
  }catch{gsToast('无法读取剪贴板');}
}

function resetWeights(){ weights={}; renderWeights(); document.getElementById('output').textContent='点击「生成咒文」创建带权重的完整 prompt...'; }

function renderWeights(){
  const el=document.getElementById('weightList');
  const entries=Object.entries(weights);
  document.getElementById('weightCount').textContent=entries.length+' 个词条';
  if(!entries.length){el.innerHTML='<p class="text-muted" style="padding:1rem 0;">还没有词条——粘贴标签或点击下方专区添加</p>';return;}
  // Sort by weight desc
  entries.sort((a,b)=>b[1]-a[1]);
  el.innerHTML=entries.map(([tag,w])=>{
    const cls=w>1.2?'max':w<0.6?'min':'';
    return `<div class="weight-row${cls?' '+cls:''}">
      <span class="weight-tag">${tag}</span>
      <div class="weight-btns">
        <button class="wt-btn" onclick="setWeight('${tag.replace(/'/g,"&#39;")}',${(w-0.1).toFixed(1)})">−</button>
        <span class="weight-val">${w.toFixed(1)}</span>
        <button class="wt-btn" onclick="setWeight('${tag.replace(/'/g,"&#39;")}',${(w+0.1).toFixed(1)})">+</button>
      </div>
      <span class="remove-tag" onclick="removeTag('${tag.replace(/'/g,"&#39;")}')">✕</span>
    </div>`;
  }).join('');
}

function genPrompt(){
  const entries=Object.entries(weights);
  if(!entries.length){gsToast('请先添加词条');return;}
  const parts=entries.map(([tag,w])=>{
    if(w===1.0) return tag;
    if(w>1.0) return `(${tag}:${w.toFixed(1)})`;
    return `(${tag}:${w.toFixed(1)})`;
  });
  const result=parts.join(', ');
  document.getElementById('output').textContent=result;
  gsToast('咒文已生成');
}
