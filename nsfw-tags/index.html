                            : 'border-white/10 bg-white/5 text-gray-300 hover:border-pink-400 hover:text-pink-300 hover:scale-102';
                        
                        tagsContainerHtml += `
                            <button onclick="toggleTag('${t.tag}', ${secId})" data-category="${secId}" class="px-3.5 py-1.5 rounded-full border text-xs font-medium transition-all duration-150 flex items-center gap-1.5 ${activeClass}">
                                <span class="font-semibold">${highlightText(t.zh, currentSearch)}</span>
                                <span class="font-mono text-[10px] opacity-60 ml-1 border-l border-white/20 pl-1.5">${highlightText(t.tag, currentSearch)}</span>
                            </button>
                        `;
                    });
                    tagsContainerHtml += `</div>`;
                }
                
                secEl.innerHTML += tagsContainerHtml;
                container.appendChild(secEl);
            });

            // Show result count
            const cntEl = document.getElementById('search-result-count');
            if (cntEl) {
                if (currentSearch) {
                    cntEl.textContent = totalFound ? '搜索 "' + currentSearch + '" → 找到 ' + totalFound + ' 个标签' : '搜索 "' + currentSearch + '" → 无匹配';
                    cntEl.classList.remove('hidden');
                } else {
                    cntEl.classList.add('hidden');
                }
            }

            // No results suggestions
            if (totalFound === 0 && currentSearch) {
                const noEl = document.createElement('div');
                noEl.className = 'no-results';
                var suggs = getPopularSuggestions(8);
                var suggHtml = '';
                suggs.forEach(function(s) {
                    suggHtml += `<button onclick="document.getElementById('search-input').value='${s.tag}';handleSearch('${s.tag}');">${s.tag} <span style="color:#888">${s.zh}</span></button>`;
                });
                noEl.innerHTML = '<div style="font-size:3rem;margin-bottom:1rem">🔮</div>' +
                    '<div style="color:#999;font-size:0.875rem;margin-bottom:0.75rem">魔典中没找到匹配 "' + currentSearch + '" 的标签呢...</div>' +
                    '<div style="color:#777;font-size:0.75rem;margin-bottom:1rem">试试这些热门标签快速跳转：</div>' +
                    '<div class="suggest-tags">' + suggHtml + '</div>';
                container.appendChild(noEl);
            }
        }

        // ----------------- PROMPT BUILDER ENGINE -----------------
        function toggleTag(tagStr, catId) {
            const index = selectedTags.findIndex(sel => sel.tag === tagStr);
            if (index > -1) {
                // Remove
                selectedTags.splice(index, 1);
            } else {
                // Add with default weight 1.0
                selectedTags.push({ tag: tagStr, weight: 1.0 });
            }
            updateBuilder();
            renderTags();
        }

        function changeWeight(tagStr, delta) {
            const index = selectedTags.findIndex(sel => sel.tag === tagStr);
            if (index > -1) {
                let w = selectedTags[index].weight + delta;
                w = Math.max(0.1, Math.min(2.0, w));
                selectedTags[index].weight = parseFloat(w.toFixed(1));
                updateBuilder();
            }
        }

        function removeSelectedTag(tagStr) {
            selectedTags = selectedTags.filter(sel => sel.tag !== tagStr);
            updateBuilder();
            renderTags();
        }

        function clearAllSelected() {
            if (selectedTags.length === 0) return;
            if (confirm("哥哥，确定要清空吟唱法阵中所有的魔咒吗？🥺")) {
                selectedTags = [];
                updateBuilder();
                renderTags();
            }
        }

        function updateBuilder() {
            // Update counts
            const count = selectedTags.length;
            document.getElementById('selected-tags-count').innerText = count;
            document.getElementById('collapsed-count').innerText = count;

            const listEl = document.getElementById('builder-list');
            listEl.innerHTML = '';

            if (selectedTags.length === 0) {
                listEl.innerHTML = `
                    <div class="text-center text-xs text-gray-500 py-10 italic select-none">
                        法阵空荡荡呢，快在上面挑选你要的魔咒注入吧～
                    </div>
                `;
                document.getElementById('positive-output').innerText = '';
                document.getElementById('negative-output').innerText = '';
                return;
            }

            selectedTags.forEach(sel => {
                // Find Chinese label
                let zhName = sel.tag;
                tagData.forEach(cat => {
                    cat.tags.forEach(t => {
                        if (t.tag === sel.tag) zhName = t.zh;
                    });
                });

                const pill = document.createElement('div');
                pill.className = "flex items-center justify-between bg-[#190d33]/90 border border-white/10 rounded-xl px-3 py-1.5 transition-all text-xs hover:border-pink-500/30";
                
                const weightDisplay = sel.weight === 1.0 ? '' : ` : ${sel.weight}`;
                
                pill.innerHTML = `
                    <div class="flex flex-col">
                        <span class="font-mono text-pink-400 font-bold tracking-wider">${sel.tag}${weightDisplay}</span>
                        <span class="text-[10px] text-gray-400 font-semibold">${zhName}</span>
                    </div>
                    <div class="flex items-center gap-1.5 shrink-0">
                        <button onclick="changeWeight('${sel.tag}', -0.1)" class="w-5 h-5 rounded bg-white/5 hover:bg-pink-500/20 text-gray-400 hover:text-white flex items-center justify-center font-bold text-xs" title="降低权重">-</button>
                        <button onclick="changeWeight('${sel.tag}', 0.1)" class="w-5 h-5 rounded bg-white/5 hover:bg-pink-500/20 text-gray-400 hover:text-white flex items-center justify-center font-bold text-xs" title="提高权重">+</button>
                        <button onclick="removeSelectedTag('${sel.tag}')" class="w-5 h-5 rounded bg-white/5 hover:bg-red-500/20 text-red-400 hover:text-white flex items-center justify-center text-xs ml-1" title="移除词条">
                            <i class="fa-solid fa-xmark"></i>
                        </button>
                    </div>
                `;
                listEl.appendChild(pill);
            });

            // Generate Output string
            generatePrompts();
        }

        function generatePrompts() {
            // Positive
            let posTags = [];
            const addPrefix = document.getElementById('prefix-checkbox').checked;
            
            if (addPrefix) {
                posTags = ["masterpiece", "best quality", "ultra-detailed", "cinematic lighting"];
            }

            selectedTags.forEach(sel => {
                if (sel.weight === 1.0) {
                    posTags.push(sel.tag);
                } else {
                    posTags.push(`(${sel.tag}:${sel.weight})`);
                }
            });

            const posPrompt = posTags.join(", ");
            document.getElementById('positive-output').innerText = posPrompt || '点击魔咒加入法阵...';

            // Negative
            const addNegative = document.getElementById('negative-checkbox').checked;
            const negPrompt = addNegative 
                ? "lowres, bad anatomy, bad hands, text, error, missing fingers, extra digit, fewer digits, cropped, worst quality, low quality, normal quality, jpeg artifacts, signature, watermark, username, blurry" 
                : "";
            
            document.getElementById('negative-output').innerText = negPrompt || '未启用除魔词条';
        }

        // ----------------- UTILS & INTERACTIONS -----------------
        function handleSearch(val) {
            if (searchDebounce) clearTimeout(searchDebounce);
            const v = val;
            searchDebounce = setTimeout(function() {
                currentSearch = v;
                renderTags();
            }, 150);
        }

        function setView(view) {
            currentView = view;
            const cardsBtn = document.getElementById('view-cards-btn');
            const compactBtn = document.getElementById('view-compact-btn');
            
            if (view === 'cards') {
                cardsBtn.className = "px-3 py-1.5 rounded-md text-xs font-bold transition-all flex items-center gap-1 text-white bg-pink-600 shadow-[0_0_10px_rgba(255,0,127,0.3)]";
                compactBtn.className = "px-3 py-1.5 rounded-md text-xs font-bold transition-all flex items-center gap-1 text-gray-400 hover:text-white";
            } else {
                cardsBtn.className = "px-3 py-1.5 rounded-md text-xs font-bold transition-all flex items-center gap-1 text-gray-400 hover:text-white";
                compactBtn.className = "px-3 py-1.5 rounded-md text-xs font-bold transition-all flex items-center gap-1 text-white bg-pink-600 shadow-[0_0_10px_rgba(255,0,127,0.3)]";
            }
            renderTags();
        }

        function toggleBuilderPanel(isCollapse) {
            const collapseBadge = document.getElementById('builder-collapsed-badge');
            const expandedBox = document.getElementById('builder-expanded-box');
            
            if (isCollapse) {
                // Collapse
                expandedBox.classList.add('hidden');
                collapseBadge.classList.remove('hidden');
            } else {
                // Expand
                expandedBox.classList.remove('hidden');
                collapseBadge.classList.add('hidden');
            }
        }

        function fallbackCopyTextToClipboard(text) {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.top = "0";
            textArea.style.left = "0";
            textArea.style.position = "fixed";
            textArea.style.opacity = "0";
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            try {
                const successful = document.execCommand('copy');
                document.body.removeChild(textArea);
                return successful;
            } catch (err) {
                document.body.removeChild(textArea);
                return false;
            }
        }

        function copyToClipboard(type) {
            const posText = document.getElementById('positive-output').innerText;
            const negText = document.getElementById('negative-output').innerText;
            
            let textToCopy = "";
            let alertMsg = "";

            if (type === 'positive') {
                textToCopy = posText;
                alertMsg = "✨ 正面魔咒吟唱词复制成功！直接贴入 SD 即可绘图哦～";
            } else if (type === 'negative') {
                textToCopy = negText;
                alertMsg = "🚫 负面除魔咒词复制成功！";
            } else {
                // Both
                textToCopy = `【正面提示词】:\n${posText}\n\n【负面提示词】:\n${negText}`;
                alertMsg = "🔮 正负双重契约词全部复制成功！";
            }

            if (!textToCopy || textToCopy.startsWith('点击') || textToCopy.startsWith('未启用')) {
                alert("法阵中还没有生成可以复制的魔咒呢，哥哥快选几个吧！💦");
                return;
            }

            const doVisualFeedback = () => {
                // Visual feedback flash
                const panel = document.getElementById('builder-expanded-box');
                panel.classList.add('border-green-500', 'shadow-[0_0_30px_rgba(34,197,94,0.4)]');
                setTimeout(() => {
                    panel.classList.remove('border-green-500', 'shadow-[0_0_30px_rgba(34,197,94,0.4)]');
                }, 800);
                
                // Show notification text inside output instead of blocking prompt
                const button = event.currentTarget;
                if (button) {
                    const origText = button.innerHTML;
                    button.innerHTML = `<i class="fa-solid fa-check"></i> 成功！`;
                    button.classList.add('bg-green-600', 'text-white');
                    setTimeout(() => {
                        button.innerHTML = origText;
                        button.classList.remove('bg-green-600', 'text-white');
                    }, 1500);
                }
            };

            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(textToCopy).then(() => {
                    doVisualFeedback();
                }).catch(err => {
                    if (fallbackCopyTextToClipboard(textToCopy)) {
                        doVisualFeedback();
                    } else {
                        alert("复制失败，可能浏览器限制了剪贴板权限，哥哥可以手动选中复制哦 😢");
                    }
                });
            } else {
                if (fallbackCopyTextToClipboard(textToCopy)) {
                    doVisualFeedback();
                } else {
                    alert("复制失败，可能浏览器限制了剪贴板权限，哥哥可以手动选中复制哦 😢");
                }
            }
        }

        function importPrompt() {
            const input = prompt("请输入您现有的 Stable Diffusion 提示词 (系统将智能匹配我们的魔典数据库)：");
            if (!input) return;
            
            // Normalize & clean tags structure
            const cleanedInput = input.replace(/[\(\)\{\}\[\]]/g, ' '); 
            const segments = cleanedInput.split(/[,;\s]+/).map(s => s.trim().toLowerCase()).filter(s => s);
            
            let matchCount = 0;
            segments.forEach(seg => {
                let tagStr = seg;
                let weight = 1.0;
                
                // Parse weight syntax if exists
                if (seg.includes(':')) {
                    const parts = seg.split(':');
                    tagStr = parts[0].trim();
                    const parsedWeight = parseFloat(parts[1]);
                    if (!isNaN(parsedWeight)) weight = parsedWeight;
                }

                // Search in database
                let exists = false;
                tagData.forEach(cat => {
                    cat.tags.forEach(t => {
                        if (t.tag.toLowerCase() === tagStr) exists = true;
                    });
                });

                if (exists) {
                    if (!selectedTags.some(sel => sel.tag === tagStr)) {
                        selectedTags.push({ tag: tagStr, weight: weight });
                        matchCount++;
                    }
                }
            });

            if (matchCount > 0) {
                updateBuilder();
                renderTags();
                alert(`✨ 魔法契约成立！成功从外部匹配并注入了 ${matchCount} 个魔咒词条！`);
            } else {
                alert("未能从输入中检索到魔咒对应的标准 Danbooru 标签，哥哥确认是不是弄错格式啦 🥺");
            }
        }

        // ----------------- SPARKLE BURST ENGINE -----------------
        window.addEventListener('click', (e) => {
            // Detect if click happened inside the special footer zone
            const isSpecialSection = e.target.closest('#section-8') || e.target.closest('[data-category="8"]');
            const emojis = isSpecialSection ? ['👣', '🧦', '💖', '🌸', '✨'] : ['🌸', '✨', '💖', '🍭', '⭐'];
            
            createEmojiBurst(e.clientX, e.clientY, emojis);
        });

        function createEmojiBurst(x, y, emojis) {
            const count = 8;
            for (let i = 0; i < count; i++) {
                const el = document.createElement('div');
                el.className = 'fixed pointer-events-none text-base md:text-lg select-none z-50 particle-emoji';
                el.innerText = emojis[Math.floor(Math.random() * emojis.length)];
                el.style.left = x + 'px';
                el.style.top = y + 'px';
                
                const angle = Math.random() * Math.PI * 2;
                const speed = 2 + Math.random() * 4;
                const vx = Math.cos(angle) * speed;
                const vy = Math.sin(angle) * speed - 1; // slight float up bias
                
                let opacity = 1;
                let px = x;
                let py = y;
                
                const duration = 600 + Math.random() * 400;
                const start = performance.now();
                
                function frame(time) {
                    const elapsed = time - start;
                    const progress = elapsed / duration;
                    if (progress >= 1) {
                        el.remove();
                        return;
                    }
                    
                    px += vx;
                    py += vy + progress * 1.5; // subtle gravity drift
                    opacity = 1 - progress;
                    
                    el.style.left = px + 'px';
                    el.style.top = py + 'px';
                    el.style.opacity = opacity;
                    el.style.transform = `scale(${1 - progress * 0.4}) rotate(${progress * 270}deg)`;
                    
                    requestAnimationFrame(frame);
                }
                document.body.appendChild(el);
                requestAnimationFrame(frame);
            }
        }

        // ----------------- SAKURA CANVAS ENGINE -----------------
        let ctx, canvas;
        let width, height;
        const petals = [];

        function initSakura() {
            canvas = document.getElementById('sakura-canvas');
            ctx = canvas.getContext('2d');
            
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;

            window.addEventListener('resize', () => {
                width = canvas.width = window.innerWidth;
                height = canvas.height = window.innerHeight;
            });

            // Populate initial petals
            const petalCount = Math.min(30, Math.floor(width / 30));
            for (let i = 0; i < petalCount; i++) {
                petals.push(new SakuraPetal());
            }

            animateSakura();
        }

        function drawSinglePetal(x, y, r, angle) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(angle);
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.bezierCurveTo(-r/2, -r/2, -r, r/3, 0, r);
            ctx.bezierCurveTo(r, r/3, r/2, -r/2, 0, 0);
            
            // Radial pink gradient for premium realism
            const grad = ctx.createRadialGradient(0, r/2, 0, 0, r/2, r);
            grad.addColorStop(0, 'rgba(255, 182, 193, 0.75)'); // cherry pink
            grad.addColorStop(0.7, 'rgba(219, 112, 147, 0.4)'); // hot pink
            grad.addColorStop(1, 'rgba(18, 10, 34, 0.05)');     // blend background
            ctx.fillStyle = grad;
            ctx.fill();
            ctx.restore();
        }

        class SakuraPetal {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height - height;
                this.r = 5 + Math.random() * 8;
                this.angle = Math.random() * Math.PI * 2;
                this.spin = (Math.random() - 0.5) * 0.02;
                this.vx = (Math.random() - 0.3) * 1.2 + 0.4; // light breeze blowing rightwards
                this.vy = 0.8 + Math.random() * 1.5;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.angle += this.spin;
                
                // Reset petal if off screen
                if (this.y > height || this.x > width || this.x < -20) {
                    this.x = Math.random() * width;
                    this.y = -20;
                    this.r = 5 + Math.random() * 8;
                    this.vx = (Math.random() - 0.3) * 1.2 + 0.4;
                    this.vy = 0.8 + Math.random() * 1.5;
                }
            }
            draw() {
                drawSinglePetal(this.x, this.y, this.r, this.angle);
            }
        }

        function animateSakura() {
            ctx.clearRect(0, 0, width, height);
            petals.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animateSakura);
        }

    </script>
