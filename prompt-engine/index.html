// === 12 THEMES ===
const themes = [
  { name:'🏫 校园日常', add:['1girl','school uniform','serafuku','classroom','smile','soft lighting','hand-drawn','anime coloring'] },
  { name:'🛁 浴室湿身', add:['1girl','bathroom','wet','wet clothes','see-through wet','steam','sweating','blush'] },
  { name:'🌙 深夜闺房', add:['1girl','bedroom','night','dim lighting','moonlight','lying','intimate','sensual'] },
  { name:'🏖️ 热带海滩', add:['1girl','bikini','beach','sunset','wet','sweating','summer','outdoor'] },
  { name:'🔗 绳缚美学', add:['1girl','bound','rope','shibari','blindfold','collar','dominated','sensual'] },
  { name:'👘 和风浴衣', add:['1girl','kimono','yukata','onsen','garden','ribbon','soft lighting'] },
  { name:'💼 OL 办公室', add:['1girl','office lady','shirt','tight skirt','glasses','office','cleavage'] },
  { name:'🐱 猫娘女仆', add:['1girl','maid','cat ears','cat tail','collar','apron','thighhighs','blush'] },
  { name:'👿 魅魔降世', add:['1girl','succubus','horns','wings','demon tail','nude','breasts','seductive smile'] },
  { name:'💕 双人亲密', add:['2girls','hug','kiss','embrace','cuddling','blush','intimate','romantic'] },
  { name:'🎀 萝莉纯爱', add:['1girl','loli','petite','flat chest','cute','blush','smile','ribbon'] },
  { name:'🔞 极限涩涩', add:['1girl','nude','spread legs','masturbation','ahegao','cum','nsfw','erotic'] },
];

let selected = [];

// === RENDER ===
function renderAll(){
  renderMatrix();
  renderTags();
  renderThemes();
}

function renderMatrix(){
  const el = document.getElementById('matrixContent');
  el.innerHTML = matrix.map(m=>`
    <div class="matrix-row">
      <span class="tag-a">${m[0]}</span>
      <span style="font-size:0.7rem;color:#a88;">✕</span>
      <span class="tag-a">${m[1]}</span>
      <span class="why">— ${m[2]}</span>
    </div>
  `).join('');
}

function renderTags(){
  const sections = document.getElementById('tagSections');
  sections.innerHTML = tagDB.map(cat=>`
    <div class="tag-section" data-cat="${cat.cat}">
      <h3>${cat.cat} (${cat.tags.length})</h3>
      <div class="tag-grid">${cat.tags.map(t=>{
        const isNSFW = cat.cat.startsWith('NSFW');
        const sel = selected.includes(t);
        return `<span class="tag-card${isNSFW?' nsfw':''}${sel?' selected':''}" onclick="toggleTag('${t.replace(/'/g,"&#39;")}')" data-tag="${t.replace(/'/g,"&#39;")}">${t}</span>`;
      }).join('')}</div>
    </div>
  `).join('');
}

function renderThemes(){
  document.getElementById('themeGrid').innerHTML = themes.map((th,i)=>
    `<div class="theme-btn" onclick="applyTheme(${i})">${th.name}</div>`
  ).join('');
}

function toggleTag(tag){
  const idx = selected.indexOf(tag);
  if(idx>=0) selected.splice(idx,1);
  else selected.push(tag);
  updateDisplay();
}

function applyTheme(idx){
  selected = [...themes[idx].add];
  updateDisplay();
  gsToast(themes[idx].name+' 已应用');
}

function clearSelected(){
  selected = [];
  updateDisplay();
}

function copySelected(){
  if(!selected.length){gsToast('请先选择标签');return;}
  gsCopy(selected.join(', '));
}

function filterTags(){
  const q = document.getElementById('tagSearch').value.toLowerCase();
  const results = document.getElementById('searchResults');
  if(!q){results.innerHTML='';return;}
  const found = [];
  tagDB.forEach(cat=>cat.tags.forEach(t=>{if(t.toLowerCase().includes(q))found.push({cat:cat.cat,tag:t});}));
  results.innerHTML = found.slice(0,30).map(f=>
    `<span class="tag-card${selected.includes(f.tag)?' selected':''}" onclick="toggleTag('${f.tag.replace(/'/g,"&#39;")}')">${f.tag}</span>`
  ).join('');
}

function updateDisplay(){
  document.getElementById('selectedTags').textContent = selected.length ? selected.join(', ') : '点击标签开始构建 prompt...';
  document.getElementById('tagCount').textContent = selected.length+' 个标签';
  renderTags();
  filterTags();
}
